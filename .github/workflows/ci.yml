name: ci

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: js
    runs-on: ubuntu-latest
    container: oven/bun:1.3.14-debian
    steps:
      - run: apt-get update && apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v6
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run knip
      - run: bun run typecheck
      - run: bun run lint
      - run: bunx prettier --check .
      - run: bun run test

  py:
    name: py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: uv run --no-sync pyrefly check services/transcription-api/src
      - run: uv run --no-sync ruff check
      - run: uv run --no-sync ruff format --check
      - run: uv run --no-sync pytest

  ci:
    name: ci
    needs: [js, py]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify js and py succeeded
        run: |
          if [ "${{ needs.js.result }}" != "success" ] || [ "${{ needs.py.result }}" != "success" ]; then
            echo "Gate failed: js=${{ needs.js.result }}, py=${{ needs.py.result }}"
            exit 1
          fi
          echo "Gate passed: js and py succeeded"
