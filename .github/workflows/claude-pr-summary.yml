name: claude pr summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: claude-pr-summary-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  summarize:
    name: claude pr summary
    if: github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: "--allowed-tools Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            Update the title and body of PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            The body may contain two independent opt-in marker lines:
                <!-- remove this line to stop claude updating the pr title -->
                <!-- remove this line to stop claude updating the pr summary -->

            Each marker opts its part in; removing a marker opts that part
            out. Never add a marker that isn't already there, and never
            remove one that is.

            Title rules:
            - If the body contains the title marker, set the title to a
              Conventional Commits subject (≤72 chars). Pick the type that
              best fits what's actually in the PR right now — feat, fix,
              chore, docs, refactor, test, build, ci, perf, style (with
              optional scope and `!` for breaking). Re-evaluate every push:
              if the PR has grown and the existing type no longer fits
              (e.g. chore → feat once a real feature lands, or fix → feat!
              once a breaking change lands), update the type.
            - Otherwise leave the title alone.

            Body rules:
            - If the body contains the summary marker, replace the body
              with the markers that are currently present (in their
              original order) followed by a concise plain-prose summary.
              No markdown headings, no other HTML comments. The summary
              should read well as a squash commit body — one or two short
              paragraphs at most.
            - Otherwise leave the body alone.

            Use `gh pr edit ${{ github.event.pull_request.number }} --title …`
            and `--body …` to apply changes. If neither needs updating, do
            nothing.
