# Mock override: pipeline-api runs in --mock mode (no GPU, no vLLM).
# Drops the vllm service entirely; pipeline-api Containerfile target=mock.

services:
  web:
    build:
      target: dev
    volumes:
      - ../apps/web/src:/app/apps/web/src:Z
      - ../apps/web/wrangler.jsonc:/app/apps/web/wrangler.jsonc:Z
      - wrangler-state:/app/apps/web/.wrangler
    command:
      - "pnpm"
      - "--filter"
      - "@totvibe/web"
      - "wrangler"
      - "dev"
      - "--ip"
      - "0.0.0.0"
      - "--port"
      - "8787"

  pipeline-api:
    build:
      target: mock
    volumes:
      - ../services/pipeline-api/src:/app/services/pipeline-api/src:Z
    command:
      - "uv"
      - "run"
      - "--package"
      - "pipeline-api"
      - "python"
      - "-m"
      - "pipeline_api"
      - "--mock"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"

  vllm:
    profiles: ["never"]
