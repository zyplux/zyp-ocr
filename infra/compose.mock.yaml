# Mock override: transcription-api runs in --mock mode (no GPU, no vLLM).
# Drops the vllm service entirely; transcription-api Containerfile target=mock.

services:
  web:
    build:
      target: dev
    volumes:
      - ../apps/web/src:/app/apps/web/src:Z
      - ../apps/web/wrangler.jsonc:/app/apps/web/wrangler.jsonc:Z
      - ../apps/web/dist:/app/apps/web/dist:Z
      - wrangler-state:/app/apps/web/.wrangler
    command: ["pnpm", "wrangler", "dev", "--ip", "0.0.0.0", "--port", "8787"]
    tty: true

  transcription-api:
    build:
      target: mock
    volumes:
      - ../services/transcription-api/src:/app/services/transcription-api/src:Z
    command:
      - "uv"
      - "run"
      - "--package"
      - "transcription-api"
      - "python"
      - "-m"
      - "transcription_api"
      - "--mock"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"

  vllm:
    profiles: ["never"]
