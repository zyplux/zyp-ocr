# Dev override: bind-mount source for hot reload, keep dev targets.

services:
  web:
    build:
      target: dev
    volumes:
      - ../apps/web/src:/app/apps/web/src:Z
      - ../apps/web/wrangler.jsonc:/app/apps/web/wrangler.jsonc:Z
      - ../apps/web/dist:/app/apps/web/dist:Z
      - wrangler-state:/app/apps/web/.wrangler
    command: ["pnpm", "wrangler", "dev", "--ip", "0.0.0.0", "--port", "8787"]
    tty: true

  transcription-api:
    build:
      target: dev
    volumes:
      - ../services/transcription-api/src:/app/services/transcription-api/src:Z
      - transcription-state:/var/lib/transcription
    command:
      - "uv"
      - "run"
      - "--package"
      - "transcription-api"
      - "uvicorn"
      - "transcription_api.app:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--reload"
