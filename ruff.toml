line-length = 120
target-version = "py314"
preview = true

[lint]
select = ["ALL"]
ignore = [
    "COM812", # the formatter owns trailing commas; the rule fights it
    "ISC001", # the formatter owns implicit string concatenation; the rule fights it
    "D",      # docstrings are optional here — code is written to be self-documenting
    "DOC",    # docstring-section rules only matter once docstrings are mandated (they aren't)
    "CPY001", # the project carries no copyright-header convention
    "S404",   # subprocess is used only by repo tooling scripts, never by service code
    "S603",   # scripts build argv themselves with no shell — no injection surface
    "S607",   # tooling (uv, just, bun) is intentionally invoked by name off PATH
]

[lint.per-file-ignores]
"**/tests/**" = [
    "INP001", # test trees are deliberately not importable packages (pytest rootdir layout)
    "S101",   # `assert` is pytest's assertion API (production asserts stay flagged)
]
"scripts/**" = [
    "INP001", # scripts/ is a bag of entry points, not an importable package
]
